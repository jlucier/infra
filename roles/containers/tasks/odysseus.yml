---
- name: Configure Odysseus AI Stack
  tags:
    - containers
    - ai
    - odysseus
    - llm
  block:
    # --- Tear down the old anythingllm/llm stack (replaced by odysseus) ---
    - name: Check for old llm compose project
      stat:
        path: "{{ docker_dir }}/llm/docker-compose.yml"
      register: old_llm_compose

    - name: Bring down old llm stack
      community.docker.docker_compose_v2:
        project_src: "{{ docker_dir }}/llm"
        state: absent
        remove_orphans: true
      when: old_llm_compose.stat.exists

    - name: Create odysseus project dir
      become: true
      file:
        path: "{{ docker_dir }}/odysseus"
        owner: "{{ username }}"
        group: "{{ username }}"
        state: directory
        mode: 0755

    # Preserve already-downloaded ollama models by moving the cache into the
    # new project dir before we delete the old one. `creates` makes it a no-op
    # once migrated (and on fresh hosts where the old cache never existed).
    - name: Migrate ollama cache to odysseus dir
      become: true
      command: mv "{{ docker_dir }}/llm/ollama_cache" "{{ docker_dir }}/odysseus/ollama_cache"
      args:
        creates: "{{ docker_dir }}/odysseus/ollama_cache"
      when: old_llm_compose.stat.exists

    - name: Remove old llm dir (drops anythingllm storage)
      become: true
      file:
        path: "{{ docker_dir }}/llm"
        state: absent

    # --- Odysseus stack ---
    - name: Create and chmod odysseus folders
      become: true
      file:
        path: "{{ item }}"
        owner: "{{ username }}"
        group: "{{ username }}"
        state: directory
        mode: 0755
        recurse: true
      loop:
        - "{{ docker_dir }}/odysseus/ollama_cache"
        - "{{ docker_dir }}/odysseus/data"
        - "{{ docker_dir }}/odysseus/logs"
        - "{{ docker_dir }}/odysseus/chromadb"
        - "{{ docker_dir }}/odysseus/searxng"
        - "{{ docker_dir }}/odysseus/ntfy"

    - name: Clone/update odysseus source
      become: true
      become_user: "{{ username }}"
      git:
        repo: https://github.com/pewdiepie-archdaemon/odysseus.git
        dest: "{{ docker_dir }}/odysseus/src"
        version: main
      register: odysseus_src

    - name: Sync compose file
      become: true
      template:
        src: files/odysseus-compose.yml
        dest: "{{ docker_dir }}/odysseus/docker-compose.yml"
        owner: "{{ username }}"
        group: "{{ username }}"
        mode: 0600

    - name: Run odysseus compose file
      community.docker.docker_compose_v2:
        project_src: "{{ docker_dir }}/odysseus"
        build: always
