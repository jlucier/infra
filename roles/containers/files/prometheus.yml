global:
  scrape_interval: 5s
  scrape_timeout: 5s

scrape_configs:
  - job_name: homeboi
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:{{ node_exporter_http }}" # node-exporter
          - "cadvisor:8080" # cAdvisor

  - job_name: ups
    metrics_path: /metrics
    static_configs:
{% for ups in upses %}
      - targets:
          - "host.docker.internal:{{ ups.exporter_port }}"
        labels:
          ups_role: "{{ ups.name }}"
{% endfor %}

  - job_name: drybox
    metrics_path: /metrics
    scrape_interval: 60s
    static_configs:
      - targets:
        - "192.168.40.10:80"
