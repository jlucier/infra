services:
  ytdlp:
    build: .
    image: ytdlp-local:latest
    container_name: ytdlp
    network_mode: service:ytdlp_wg
    environment:
      - INPUT=/sync/input.txt
      - ARCHIVE=/data/archive.txt
      - OUTPUT_DIR=/downloads
      - SLEEP={{ ytdlp_sleep | default(3600) }}
    volumes:
      - "{{ docker_dir }}/ytdlp/data:/data"
      - "{{ syncthing_sync_dir }}/{{ ytdlp_sync_subdir }}:/sync:ro"
      - "{{ ytdlp_download_dir }}:/downloads"
    depends_on:
      ytdlp_wg:
        condition: service_healthy
      ytdlp_pot:
        condition: service_healthy
    restart: unless-stopped

  ytdlp_pot:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: ytdlp_pot
    init: true
    network_mode: service:ytdlp_wg
    depends_on:
      ytdlp_wg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4416/ping',r=>process.exit(r.statusCode==200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    restart: on-failure:5

  ytdlp_wg:
    image: lscr.io/linuxserver/wireguard
    container_name: ytdlp_wg
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
    environment:
      - PUID={{ uid }}
      - PGID={{ guid }}
      - TZ={{ timezone }}
    volumes:
      - "{{ docker_dir }}/ytdlp/wg0.conf:/config/wg0.conf"
      - "/lib/modules:/lib/modules"
    healthcheck:
      test: ["CMD-SHELL", "wg show wg0 | grep -q 'latest handshake'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
